<div class="log-viewer-container">
  <div class="toolbar">
    <div class="search-bar">
      <input
        type="text"
        [placeholder]="'Search logs...'"
        [(ngModel)]="searchQuery"
        (input)="handleSearchInput(searchQuery)"
        class="search-input"
      />
      <span class="match-count" *ngIf="searchQuery && matchLineIndices.length > 0">
        {{ matchCount }}
      </span>
      <button
        *ngIf="searchQuery && matchLineIndices.length > 0"
        (click)="prevMatch()"
        class="nav-btn"
        type="button"
        title="Previous match"
      >&#8593;</button>
      <button
        *ngIf="searchQuery && matchLineIndices.length > 0"
        (click)="nextMatch()"
        class="nav-btn"
        type="button"
        title="Next match"
      >&#8595;</button>
      <button
        *ngIf="searchQuery"
        (click)="handleSearchInput('')"
        class="clear-btn"
        type="button"
        aria-label="Clear search"
      >x</button>
    </div>
    <div class="actions">
      <button
        *ngIf="root === 'logs' && planDirectory"
        (click)="viewPlanFile()"
        class="action-btn"
      >
        View Plan
      </button>
      <button
        (click)="startTailing()"
        [disabled]="isTailing"
        class="action-btn"
      >
        Start tailing
      </button>
      <button
        (click)="stopTailing()"
        [disabled]="!isTailing"
        class="action-btn"
      >
        Stop tailing
      </button>
      <button
        (click)="goToLatest()"
        class="action-btn"
      >
        Go to latest
      </button>
      <span *ngIf="isTailing" class="tailing-indicator">
        Tailing active
      </span>
    </div>
  </div>

  <div *ngIf="isLoading" class="loading-indicator">
    Loading...
  </div>

  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>

  <pre
    *ngIf="!isLoading && !error"
    (scroll)="onScroll()"
    #logContent
    class="log-content"
  >
    <ng-container *ngFor="let line of filteredLines; trackBy: trackByLine; let i = index">
      <span [id]="'log-line-' + i" [innerHTML]="line"></span>
      <br />
    </ng-container>
  </pre>
</div>
