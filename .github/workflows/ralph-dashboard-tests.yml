name: Ralph Dashboard Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'ralph-dashboard/**'
      - '.github/workflows/ralph-dashboard-tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ralph-dashboard/**'
      - '.github/workflows/ralph-dashboard-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ralph-dashboard

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ralph-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:cov
