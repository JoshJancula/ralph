name: Bats tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  bats:
    name: Run Bats harness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore symlinks from bundle
        run: |
          ln -s bundle/.ralph .ralph
          ln -s bundle/.cursor .cursor
          ln -s bundle/.codex .codex
          ln -s bundle/.claude .claude

      - name: Set up Bats
        uses: bats-core/bats-action@4.0.0

      - name: Generate test fixtures for .agents/
        run: bash scripts/setup-test-fixtures.sh

      - name: Run Bats suite
        env:
          RALPH_USAGE_RISKS_ACKNOWLEDGED: "1"
        run: bats tests/bats/*.bats